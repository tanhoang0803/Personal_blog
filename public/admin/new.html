<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Article — My Blog</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="site-logo">My Blog</a>
      <nav class="site-nav">
        <a href="../index.html">Home</a>
        <span id="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <div class="form-header">
        <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
        <h1>New Article</h1>
      </div>

      <p class="alert alert-error" id="form-error" hidden></p>

      <form id="article-form" class="form article-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title"
            required placeholder="Enter article title">
        </div>
        <div class="form-group">
          <label for="publishedAt">Publication Date</label>
          <input type="date" id="publishedAt" name="publishedAt" required>
        </div>
        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" rows="18"
            required placeholder="Write your article content here..."></textarea>
        </div>
        <div class="form-actions">
          <a href="index.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Publish Article</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/admin/new.js"></script>
</body>
</html>
