<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — My Blog</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">My Blog</a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <span id="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-hero">
      <h1>Welcome to My Blog</h1>
      <p>Thoughts, ideas, and articles on various topics.</p>
    </section>

    <section class="article-list" id="article-list">
      <p class="empty-state">Loading articles...</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
