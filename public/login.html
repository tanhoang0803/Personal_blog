<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — My Blog</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">My Blog</a>
      <nav class="site-nav">
        <a href="/">Home</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="auth-section">
      <div class="auth-card">
        <h1>Admin Login</h1>

        <p class="alert alert-error" id="login-error" hidden></p>

        <form id="login-form" class="form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
              required autocomplete="username" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
              required autocomplete="current-password" placeholder="Enter password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/utils.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
